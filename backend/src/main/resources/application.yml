server:
  port: 8080

spring:
  application:
    name: cafflog-backend
  datasource:
    url: jdbc:mysql://localhost:3306/cafflog?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf8mb4
    username: root
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  cache:
    type: redis
    redis:
      time-to-live: 300000  # 5分钟
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: 1000ms
  jackson:
    property-naming-strategy: SNAKE_CASE
    date-format: yyyy-MM-dd'T'HH:mm:ssXXX

# 微信小程序配置
wechat:
  appid: wx3e30f4679b65d2bb
  secret: your_wechat_app_secret

# JWT 配置
jwt:
  secret: cafflog-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 604800000  # 7天，单位毫秒

logging:
  level:
    com.cafflog: DEBUG
